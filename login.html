<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inloggen — Yieldbase</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=27" />
</head>
<body class="login-body">
  <div class="login-shell">
    <!-- LEFT: Yieldbase brand -->
    <aside class="login-brand yield-brand">
      <div class="login-brand-inner">
        <div class="yield-logo">
          <svg viewBox="0 0 32 32" width="36" height="36" aria-hidden="true">
            <rect x="4"  y="20" width="5" height="8"  rx="1" fill="#a7f3d0"/>
            <rect x="13" y="14" width="5" height="14" rx="1" fill="#6ee7b7"/>
            <rect x="22" y="6"  width="5" height="22" rx="1" fill="#34d399"/>
          </svg>
          <span class="yield-wordmark">YIELDBASE</span>
        </div>

        <p class="yield-tagline">
          POS-data inzichten<br/>voor de bakkers- en<br/>banketbakkerssector.
        </p>

        <p class="yield-subtagline">
          Slimmer ondernemen.<br/>Meer marge. Minder gedoe.
        </p>
      </div>
      <div class="login-brand-footer">© Yieldbase · Software voor de bakker</div>
    </aside>

    <!-- RIGHT: form -->
    <main class="login-main">
      <div class="login-card">
        <h1 class="login-title">Welkom terug</h1>
        <p class="login-sub">Log in om het dashboard van je bakkerij te bekijken.</p>

        <form id="loginForm" class="login-form" novalidate>
          <label class="login-field">
            <span class="login-label">E-mailadres</span>
            <input
              type="email"
              id="email"
              autocomplete="username"
              placeholder="naam@bakkerij.nl"
              required
            />
          </label>

          <label class="login-field">
            <span class="login-label">Wachtwoord</span>
            <input
              type="password"
              id="password"
              autocomplete="current-password"
              placeholder="••••••••"
              required
            />
          </label>

          <div class="login-error" id="loginError" role="alert"></div>

          <button type="submit" class="login-btn yield-btn">Inloggen</button>

          <a href="#" class="login-forgot">Wachtwoord vergeten?</a>
        </form>

      </div>
    </main>
  </div>

  <script src="auth.js?v=27"></script>
</body>
</html>
