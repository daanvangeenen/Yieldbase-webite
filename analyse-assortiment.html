  <script src="auth.js?v=49"></script>
  <script>
    let currentStore = 'totaal';
    let currentPeriod = '30d';

    const STORE_LABELS = {
      totaal: 'totaal alle winkels',
      ziekerstraat: 'Ziekerstraat',
      heyendaal: 'Heyendaal',
      lent: 'Lent',
      daalseweg: 'Daalseweg',
    };
    const STORE_RATIOS = {
      totaal: 1, ziekerstraat: 0.288, heyendaal: 0.239, lent: 0.191, daalseweg: 0.147,
    };
    // Alleen 2 periodes op de analyse-pagina's: afgelopen 30 dagen of YTD.
    const PERIOD_LABELS = {
      '30d': '22 mrt – 20 apr 2025',
      ytd:   '1 jan – 20 apr 2025',
    };
    const PERIOD_FOOTER = {
      '30d': 'Periode: afgelopen 30 dagen (22 mrt – 20 apr 2025)',
      ytd:   'Periode: 1 januari – 20 april 2025',
    };
    // Schaal t.o.v. één referentie-week (€ 67.450).
    // 30d ≈ 4,3 weken · YTD = 1 jan – 20 apr ≈ 15,5 weken.
    const PERIOD_SCALE = { '30d': 4.3, ytd: 15.5 };

    // Totale weekomzet alle winkels = € 67.450 (zie CLAUDE.md).
    // Voor 'maand' wordt periodScale 1 gebruikt — alle getallen hieronder
    // zijn maand-niveau (€67.450 × 4 weken ≈ €269.800).
    // Het Pareto-aandeel (omzet%) blijft stabiel ongeacht periode/winkel.
    const TOTAL_ASSORTIMENT = 85;          // totaal aantal producten in assortiment
    const TOP20_COUNT       = 17;          // 20% van 85 ≈ 17
    const LONG_TAIL_COUNT   = 43;          // onderste 50%
    const DEAD_STOCK_COUNT  = 12;          // < 5× verkocht per maand
    const BASE_WEEKOMZET    = 67450;       // referentie totaal (week, alle winkels)

    // Top 10 — naam, categorie, omzet-aandeel% (referentie totaal week)
    const TOP10 = [
      { name: 'Strikgebakje',      cat: 'Gebak',               sharePct: 14.1 },
      { name: 'Slagroomtaart 8p',  cat: 'Taart op bestelling', sharePct: 10.7 },
      { name: 'Bruin desem',       cat: 'Brood',               sharePct:  8.6 },
      { name: 'Tompouce',          cat: 'Gebak',               sharePct:  7.0 },
      { name: 'Croissant',         cat: 'Koek & klein',        sharePct:  5.8 },
      { name: 'Appelflap',         cat: 'Koek & klein',        sharePct:  4.8 },
      { name: 'Wit casino',        cat: 'Brood',               sharePct:  4.1 },
      { name: 'Eclair',            cat: 'Gebak',               sharePct:  3.5 },
      { name: 'Bonbondoos 9 st.',  cat: 'Overig',              sharePct:  3.0 },
      { name: 'Worstenbroodje',    cat: 'Koek & klein',        sharePct:  2.6 },
    ];

    // 'Dead stock'-kandidaten — bovenkant van de lange staart die je
    // overweegt te schrappen. Verkoop = stuks deze maand bij totaal.
    const DEAD_STOCK = [
      { name: 'Vruchtenvlaai mini', cat: 'Gebak',        sold: 4, share: 0.10 },
      { name: 'Krentenbol XL',      cat: 'Brood',        sold: 3, share: 0.08 },
      { name: 'Kano-gebakje',       cat: 'Gebak',        sold: 4, share: 0.09 },
      { name: 'Tijgerbrood half',   cat: 'Brood',        sold: 2, share: 0.05 },
      { name: 'Saucijzenbroodje',   cat: 'Koek & klein', sold: 3, share: 0.06 },
      { name: 'Bokkenpootje',       cat: 'Koek & klein', sold: 2, share: 0.04 },
    ];

    function fmtEuro(n) {
      return '€ ' + Math.round(n).toLocaleString('nl-NL');
    }

    function renderAnalysis() {
      const storeRatio  = STORE_RATIOS[currentStore];
      const periodScale = PERIOD_SCALE[currentPeriod];
      const totaalOmzet = BASE_WEEKOMZET * storeRatio * periodScale;
      const periodText  = { '30d': 'in de afgelopen 30 dagen', ytd: 'dit jaar' }[currentPeriod];

      // Cumulative percentages opbouwen voor top 10
      let cum = 0;
      const top10 = TOP10.map(p => {
        cum += p.sharePct;
        return { ...p, omzet: totaalOmzet * (p.sharePct / 100), cumPct: cum };
      });
      const top10CumPct = top10[9].cumPct;

      document.getElementById('analysisContent').innerHTML = `
        <section class="analysis-intro">
          <div class="analysis-intro-badge">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          </div>
          <div class="analysis-intro-text">
            <h2 class="analysis-intro-title">20% van je producten = 78% van je omzet</h2>
            <p class="analysis-intro-sub">
              Je voert <strong>${TOTAL_ASSORTIMENT} producten</strong>. ${periodText.charAt(0).toUpperCase() + periodText.slice(1)}
              komt <strong>78%</strong> van de omzet uit slechts <strong>${TOP20_COUNT} producten</strong> — de klassieke Pareto-verdeling.
              De onderkant van je assortiment (<strong>${LONG_TAIL_COUNT} producten</strong>) levert samen maar <strong>5%</strong> op.
            </p>
          </div>
        </section>

        <!-- Pareto-segmenten in 3 staafjes -->
        <section class="card">
          <div class="card-head">
            <div>
              <h2 class="card-title">Pareto-verdeling van je assortiment</h2>
              <p class="card-sub">${STORE_LABELS[currentStore]} · ${periodText} · totaal ${fmtEuro(totaalOmzet)}</p>
            </div>
          </div>
          <ul class="pareto-bars">
            <li class="pareto-row">
              <div class="pareto-row-head">
                <span class="pareto-row-label"><strong>Top 17 producten</strong> · 20% van assortiment</span>
                <span class="pareto-row-value">${fmtEuro(totaalOmzet * 0.78)} · 78%</span>
              </div>
              <div class="pareto-bar-track"><div class="pareto-bar-fill pareto-fill-top" style="width:78%"></div></div>
            </li>
            <li class="pareto-row">
              <div class="pareto-row-head">
                <span class="pareto-row-label"><strong>Midden 25 producten</strong> · 30% van assortiment</span>
                <span class="pareto-row-value">${fmtEuro(totaalOmzet * 0.17)} · 17%</span>
              </div>
              <div class="pareto-bar-track"><div class="pareto-bar-fill pareto-fill-mid" style="width:17%"></div></div>
            </li>
            <li class="pareto-row">
              <div class="pareto-row-head">
                <span class="pareto-row-label"><strong>Onderkant 43 producten</strong> · 50% van assortiment</span>
                <span class="pareto-row-value">${fmtEuro(totaalOmzet * 0.05)} · 5%</span>
              </div>
              <div class="pareto-bar-track"><div class="pareto-bar-fill pareto-fill-low" style="width:5%"></div></div>
            </li>
          </ul>
        </section>

        <!-- Top 10 met omzet + cumulatief % -->
        <section class="card">
          <div class="card-head">
            <div>
              <h2 class="card-title">Top 10 omzet­dragers</h2>
              <p class="card-sub">Samen goed voor ${top10CumPct.toFixed(0)}% van je omzet · ${STORE_LABELS[currentStore]} · ${periodText}</p>
            </div>
          </div>
          <table class="table pareto-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Product</th>
                <th>Categorie</th>
                <th class="num">Omzet</th>
                <th class="num">% omzet</th>
                <th class="bar-col">Cumulatief %</th>
              </tr>
            </thead>
            <tbody>
              ${top10.map((p, i) => {
                const rankClass = i < 5 ? 'rank-top' : '';
                return `
                  <tr>
                    <td class="${rankClass}">${i + 1}</td>
                    <td><strong>${p.name}</strong></td>
                    <td>${p.cat}</td>
                    <td class="num">${fmtEuro(p.omzet)}</td>
                    <td class="num">${p.sharePct.toFixed(1)}%</td>
                    <td class="bar-col">
                      <div class="hour-bar-track">
                        <div class="hour-bar-fill" style="width:${p.cumPct}%"></div>
                      </div>
                      <div class="urgency-meta">${p.cumPct.toFixed(0)}% van totale omzet</div>
                    </td>
                  </tr>
                `;
              }).join('')}
            </tbody>
          </table>
        </section>

        <!-- Long tail / dead stock -->
        <section class="card">
          <div class="card-head">
            <div>
              <h2 class="card-title">'Dead stock' — kandidaten om te schrappen</h2>
              <p class="card-sub">Verkochten &lt; 5× per maand en samen &lt; 0,5% omzet · ${STORE_LABELS[currentStore]}</p>
            </div>
            <span class="priority-badge priority-medium">${DEAD_STOCK_COUNT} producten totaal</span>
          </div>
          <table class="table">
            <thead>
              <tr>
                <th>Product</th>
                <th>Categorie</th>
                <th class="num">Verkocht ${periodText}</th>
                <th class="num">% omzet</th>
              </tr>
            </thead>
            <tbody>
              ${DEAD_STOCK.map(p => {
                const sold = Math.max(0, Math.round(p.sold * storeRatio * (periodScale / PERIOD_SCALE['30d'])));
                return `
                  <tr>
                    <td><strong>${p.name}</strong></td>
                    <td>${p.cat}</td>
                    <td class="num">${sold}×</td>
                    <td class="num">${p.share.toFixed(2)}%</td>
                  </tr>
                `;
              }).join('')}
            </tbody>
          </table>
        </section>

        <section class="analysis-tip">
          <span class="analysis-tip-icon">💡</span>
          <div>
            <strong>Wat hiermee te doen?</strong> Geef de top 10 een ruime, vaste plek
            in de vitrine. Test of je 5–10 producten uit de onderkant kunt schrappen
            of vervangen door iets nieuws — het levert nauwelijks omzet op, maar wel
            inkoop-, productie- en derving-kosten.
          </div>
        </section>
      `;
    }

    document.querySelectorAll('.store-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        currentStore = tab.dataset.store;
        document.querySelectorAll('.store-tab').forEach(t => t.classList.toggle('active', t === tab));
        renderAnalysis();
      });
    });

    document.querySelectorAll('.period-toggle button').forEach(btn => {
      btn.addEventListener('click', () => {
        currentPeriod = btn.dataset.period;
        document.querySelectorAll('.period-toggle button').forEach(b => b.classList.toggle('active', b === btn));
        document.getElementById('datePickerLabel').textContent = PERIOD_LABELS[currentPeriod];
        document.getElementById('footerPeriod').textContent = PERIOD_FOOTER[currentPeriod];
        renderAnalysis();
      });
    });

    renderAnalysis();
  </script>
</body>
