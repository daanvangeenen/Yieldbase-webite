  <script src="auth.js?v=28"></script>
  <script>
    let currentStore = 'totaal';
    let currentPeriod = 'maand';

    const STORE_LABELS = {
      totaal: 'totaal alle winkels',
      ziekerstraat: 'Ziekerstraat',
      heyendaal: 'Heyendaal',
      lent: 'Lent',
      daalseweg: 'Daalseweg',
    };
    const STORE_RATIOS = {
      totaal: 1, ziekerstraat: 0.288, heyendaal: 0.239, lent: 0.191, daalseweg: 0.147,
    };
    const PERIOD_LABELS = {
      dag: '20 apr 2025',
      week: '14 apr – 20 apr 2025',
      maand: 'apr 2025',
      ytd: '1 jan – 20 apr 2025',
    };
    const PERIOD_FOOTER = {
      dag: 'Periode: 20 april 2025',
      week: 'Periode: 14 – 20 april 2025',
      maand: 'Periode: april 2025',
      ytd: 'Periode: 1 januari – 20 april 2025',
    };
    const PERIOD_SCALE = { dag: 0.04, week: 0.25, maand: 1, ytd: 3.7 };

    const UITVERKOCHT = [
      { name: 'Bruin desem',       cat: 'Brood',                timesOut: 12, avgTime: '11:30', dayPct: 41, advice: '+35% productie', priority: 'high' },
      { name: 'Slagroomtaart 8p',  cat: 'Taart op bestelling',  timesOut: 14, avgTime: '12:45', dayPct: 52, advice: '+25% productie', priority: 'high' },
      { name: 'Strikgebakje',      cat: 'Gebak',                timesOut: 18, avgTime: '14:20', dayPct: 67, advice: '+30% productie', priority: 'high' },
      { name: 'Croissant',         cat: 'Koek & klein',         timesOut:  7, avgTime: '10:30', dayPct: 32, advice: '+40% productie', priority: 'high' },
      { name: 'Worstenbroodje',    cat: 'Koek & klein',         timesOut: 10, avgTime: '13:15', dayPct: 57, advice: '+20% productie', priority: 'medium' },
      { name: 'Appelflap',         cat: 'Koek & klein',         timesOut:  8, avgTime: '14:50', dayPct: 71, advice: '+15% productie', priority: 'medium' },
      { name: 'Tompouce',          cat: 'Gebak',                timesOut: 11, avgTime: '15:40', dayPct: 79, advice: '+15% productie', priority: 'medium' },
      { name: 'Eclair',            cat: 'Gebak',                timesOut:  9, avgTime: '16:00', dayPct: 82, advice: '+10% productie', priority: 'low' },
      { name: 'Wit casino',        cat: 'Brood',                timesOut:  5, avgTime: '16:30', dayPct: 86, advice: '+5% productie',  priority: 'low' },
      { name: 'Bonbondoos 9 st.',  cat: 'Overig',               timesOut:  6, avgTime: '17:00', dayPct: 91, advice: '+5% productie',  priority: 'low' },
    ];

    function renderAnalysis() {
      const storeRatio = STORE_RATIOS[currentStore];
      const periodScale = PERIOD_SCALE[currentPeriod];
      const scaledProducts = UITVERKOCHT.map(p => ({
        ...p,
        timesOut: Math.max(1, Math.round(p.timesOut * storeRatio * periodScale)),
      }));
      const highCount = scaledProducts.filter(p => p.priority === 'high').length;
      const periodText = { dag: 'deze dag', week: 'deze week', maand: 'deze maand', ytd: 'dit jaar' }[currentPeriod];

      document.getElementById('analysisContent').innerHTML = `
        <section class="analysis-intro">
          <div class="analysis-intro-badge">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v4M12 16h.01"/></svg>
          </div>
          <div class="analysis-intro-text">
            <h2 class="analysis-intro-title">Wanneer is mijn product uitverkocht?</h2>
            <p class="analysis-intro-sub">
              Deze 10 producten verkopen ${periodText} regelmatig uit voor sluitingstijd. <strong>${highCount} daarvan verdienen prioriteit</strong> —
              ze raken op vóór de middag of zijn meermaals op rij uitverkocht. Overweeg meer te bakken.
            </p>
          </div>
        </section>

        <section class="card">
          <div class="card-head">
            <div>
              <h2 class="card-title">Top 10 meest relevante producten</h2>
              <p class="card-sub">Gerangschikt op urgentie · ${STORE_LABELS[currentStore]} · ${periodText}</p>
            </div>
          </div>
          <table class="table uitverkocht-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Product</th>
                <th>Categorie</th>
                <th class="num">× uitverkocht</th>
                <th class="num">Gem. tijd uitverkocht</th>
                <th class="bar-col">Hoe vroeg op de dag?</th>
                <th>Advies</th>
              </tr>
            </thead>
            <tbody>
              ${scaledProducts.map((p, i) => {
                const urgencyPct = 100 - p.dayPct;
                const priorityClass = `priority-${p.priority}`;
                const rankClass = i < 4 ? 'rank-top' : '';
                return `
                  <tr>
                    <td class="${rankClass}">${i + 1}</td>
                    <td><strong>${p.name}</strong></td>
                    <td>${p.cat}</td>
                    <td class="num">${p.timesOut}×</td>
                    <td class="num">${p.avgTime}</td>
                    <td class="bar-col">
                      <div class="urgency-bar-track">
                        <div class="urgency-bar-fill ${priorityClass}" style="width:${urgencyPct}%"></div>
                      </div>
                      <div class="urgency-meta">${p.dayPct}% van dag verstreken</div>
                    </td>
                    <td><span class="priority-badge ${priorityClass}">${p.advice}</span></td>
                  </tr>
                `;
              }).join('')}
            </tbody>
          </table>
        </section>

        <section class="analysis-tip">
          <span class="analysis-tip-icon">💡</span>
          <div>
            <strong>Lezen van deze tabel:</strong> hoe verder de balk naar rechts staat,
            hoe vroeger op de dag het product uitverkocht raakt — en hoe groter de gemiste omzet.
            Producten met een rode balk verdienen direct aandacht.
          </div>
        </section>
      `;
    }

    document.querySelectorAll('.store-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        currentStore = tab.dataset.store;
        document.querySelectorAll('.store-tab').forEach(t => t.classList.toggle('active', t === tab));
        renderAnalysis();
      });
    });

    document.querySelectorAll('.period-toggle button').forEach(btn => {
      btn.addEventListener('click', () => {
        currentPeriod = btn.dataset.period;
        document.querySelectorAll('.period-toggle button').forEach(b => b.classList.toggle('active', b === btn));
        document.getElementById('datePickerLabel').textContent = PERIOD_LABELS[currentPeriod];
        document.getElementById('footerPeriod').textContent = PERIOD_FOOTER[currentPeriod];
        renderAnalysis();
      });
    });

    renderAnalysis();
  </script>
</body>
